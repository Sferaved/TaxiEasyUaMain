name: Android CI/CD to Google Play

permissions:
  contents: write
  pull-requests: read

on:
  push:
    tags:
      - '*'

jobs:
  build_and_publish:
    name: Build and Publish to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          clean: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare and build
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          # Проверка наличия файлов в репозитории
          echo "📁 Checking required files..."

          if [ -f "app/keystore/keystore.jks" ]; then
            echo "✅ keystore.jks found in repository"
          else
            echo "❌ keystore.jks not found in repository"
            exit 1
          fi

          if [ -f "app/google-services.json" ]; then
            echo "✅ google-services.json found in repository"
          else
            echo "❌ google-services.json not found in repository"
            exit 1
          fi

          # Получение версии из тега
          TAG_NAME=${GITHUB_REF_NAME}
          CLEAN_VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          SUFFIX=$(echo "$CLEAN_VERSION" | grep -oE '[0-9]+$' || echo "1000")
          VERSION_CODE="1${SUFFIX}"

          echo "version_name=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📌 Version: $CLEAN_VERSION → versionCode: $VERSION_CODE"

          # Сборка
          ./gradlew bundleRelease \
            -Pandroid.injected.version.code="$VERSION_CODE" \
            -Pandroid.injected.version.name="$CLEAN_VERSION" \
            --stacktrace

          # Проверка AAB
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB_PATH" ]; then
            echo "✅ Build successful!"
            ls -la $(dirname "$AAB_PATH")
            echo "AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
          else
            echo "❌ Build failed - AAB not found"
            exit 1
          fi
        id: build

#      # Упрощенная публикация через готовый action
#      - name: Publish to Google Play
#        uses: r0adkll/upload-google-play@v1
#        with:
#          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
#          packageName: com.taxi.easy.ua
#          releaseFiles: app/build/outputs/bundle/release/app-release.aab
#          track: internal
#          whatsNewDirectory: app/src/main/play

      - name: Publish to Google Play
        run: |
          set -e
          PACKAGE_NAME="com.taxi.easy.ua"
          AAB_PATH="${{ env.AAB_PATH }}"

          echo "🚀 Starting publication process..."

          # Создаем JSON файл из секрета
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > /tmp/service-account.json
          JSON_FILE="/tmp/service-account.json"

          # Проверка наличия service account
          if [ ! -f "$JSON_FILE" ]; then
            echo "❌ Service account file not created"
            exit 1
          fi

          echo "✅ Service account file created"

          # Получение токена
          CLIENT_EMAIL=$(jq -r '.client_email' "$JSON_FILE")
          PRIVATE_KEY=$(jq -r '.private_key' "$JSON_FILE")

          if [ -z "$CLIENT_EMAIL" ] || [ -z "$PRIVATE_KEY" ]; then
            echo "❌ Failed to extract client_email or private_key from service account"
            exit 1
          fi

          echo "✅ Service account data extracted"

          NOW=$(date +%s)
          EXP=$(($NOW + 3600))

          JWT_HEADER='{"alg":"RS256","typ":"JWT"}'
          JWT_CLAIM="{\"iss\":\"$CLIENT_EMAIL\",\"scope\":\"https://www.googleapis.com/auth/androidpublisher\",\"aud\":\"https://oauth2.googleapis.com/token\",\"exp\":$EXP,\"iat\":$NOW}"

          B64_HEADER=$(echo -n "$JWT_HEADER" | base64 -w 0 | tr '/+' '_-' | tr -d '=')
          B64_CLAIM=$(echo -n "$JWT_CLAIM" | base64 -w 0 | tr '/+' '_-' | tr -d '=')

          echo "$PRIVATE_KEY" > /tmp/private-key.pem

          SIGNATURE=$(echo -n "$B64_HEADER.$B64_CLAIM" | openssl dgst -sha256 -sign /tmp/private-key.pem | base64 -w 0 | tr '/+' '_-' | tr -d '=')

          ACCESS_TOKEN=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$B64_HEADER.$B64_CLAIM.$SIGNATURE" \
            | jq -r '.access_token // empty')

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Failed to get access token"
            ERROR_RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$B64_HEADER.$B64_CLAIM.$SIGNATURE")
            echo "Error response: $ERROR_RESPONSE"
            exit 1
          fi

          echo "✅ Access token obtained"

          # Создание edit
          EDIT_RESPONSE=$(curl -s -X POST -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits")

          EDIT_ID=$(echo "$EDIT_RESPONSE" | jq -r '.id // empty')

          if [ -z "$EDIT_ID" ]; then
            echo "❌ Failed to create edit"
            echo "Response: $EDIT_RESPONSE"
            exit 1
          fi

          echo "✅ Edit created: $EDIT_ID"

          # Загрузка AAB
          echo "📦 Uploading AAB file..."

          UPLOAD_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$AAB_PATH" \
            "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID/bundles?uploadType=media")

          VERSION_CODE=$(echo "$UPLOAD_RESPONSE" | jq -r '.versionCode // empty')

          if [ -z "$VERSION_CODE" ]; then
            echo "❌ Upload failed"
            echo "Response: $UPLOAD_RESPONSE"
            exit 1
          fi

          echo "✅ AAB uploaded, versionCode: $VERSION_CODE"

          # Загрузка release notes из файлов
          echo "📝 Loading release notes from app/src/main/play..."

          # Проверка наличия директории с release notes
          if [ ! -d "app/src/main/play" ]; then
            echo "❌ Directory app/src/main/play not found"
            exit 1
          fi

          # Английский
          EN_NOTES_FILE="app/src/main/play/en-US/whatsnew.txt"
          if [ -f "$EN_NOTES_FILE" ]; then
            EN_NOTES=$(cat "$EN_NOTES_FILE" | jq -Rs .)
            echo "✅ English notes loaded:"
            echo "$(cat "$EN_NOTES_FILE")"
          else
            echo "❌ English notes file not found: $EN_NOTES_FILE"
            exit 1
          fi

          # Русский
          RU_NOTES_FILE="app/src/main/play/ru-RU/whatsnew.txt"
          if [ -f "$RU_NOTES_FILE" ]; then
            RU_NOTES=$(cat "$RU_NOTES_FILE" | jq -Rs .)
            echo "✅ Russian notes loaded:"
            echo "$(cat "$RU_NOTES_FILE")"
          else
            echo "❌ Russian notes file not found: $RU_NOTES_FILE"
            exit 1
          fi

          # Украинский
          UK_NOTES_FILE="app/src/main/play/uk/whatsnew.txt"
          if [ -f "$UK_NOTES_FILE" ]; then
            UK_NOTES=$(cat "$UK_NOTES_FILE" | jq -Rs .)
            echo "✅ Ukrainian notes loaded:"
            echo "$(cat "$UK_NOTES_FILE")"
          else
            echo "❌ Ukrainian notes file not found: $UK_NOTES_FILE"
            exit 1
          fi

          echo "✅ All release notes loaded successfully"

          # Обновление треков
          echo "🔄 Updating tracks (internal, alpha, beta)..."

          for TRACK in internal alpha beta; do
            echo "  Updating $TRACK track..."

            # Создаем JSON payload
            JSON_PAYLOAD=$(jq -n \
              --argjson vc "$VERSION_CODE" \
              --argjson en "$EN_NOTES" \
              --argjson ru "$RU_NOTES" \
              --argjson uk "$UK_NOTES" \
              '{
                releases: [
                  {
                    versionCodes: [$vc],
                    status: "completed",
                    releaseNotes: [
                      {language: "en-US", text: $en},
                      {language: "ru-RU", text: $ru},
                      {language: "uk", text: $uk}
                    ]
                  }
                ]
              }')

            # Отправляем запрос
            TRACK_RESPONSE=$(curl -s -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$JSON_PAYLOAD" \
              "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.AAB_PATH }}
          name: Release ${{ steps.build.outputs.version_name }}
          body_path: app/src/main/play/en-US/whatsnew.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}